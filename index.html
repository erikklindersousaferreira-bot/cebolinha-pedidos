<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cebolinha Pastéis & Batata | Peça aqui</title>
<link rel="icon" href="https://i.postimg.cc/sXqhnWzb/696529294-17885805324545818-7719097073946521613-n-Photoroom.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="topbar">
    <div class="topbar-inner">
      <img src="https://i.postimg.cc/sXqhnWzb/696529294-17885805324545818-7719097073946521613-n-Photoroom.png" alt="Cebolinha Pastéis & Batata" class="logo">
      <div class="brand-text">
        <h1>Cebolinha</h1>
        <p>Pastéis &amp; Batata</p>
      </div>
      <button class="cart-btn" id="openCartBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
  </header>

  <nav class="catnav" id="catnav">
    <button class="catnav-btn active" data-target="pasteis">Pastéis</button>
    <button class="catnav-btn" data-target="batatas">Batatas</button>
    <button class="catnav-btn" data-target="bebidas">Bebidas</button>
  </nav>

  <main class="menu">

    <section class="category" id="pasteis">
      <h2 class="category-title">Pastéis</h2>
      <p class="category-sub">Todos R$ 3,00 a mais para qualquer adicional</p>
      <div class="items-grid" id="grid-pasteis"></div>
    </section>

    <section class="category" id="batatas">
      <h2 class="category-title">Batatas</h2>
      <div class="items-grid" id="grid-batatas"></div>
    </section>

    <section class="category" id="bebidas">
      <h2 class="category-title">Bebidas</h2>
      <div class="items-grid" id="grid-bebidas"></div>
    </section>

  </main>

  <!-- Botão flutuante carrinho mobile -->
  <button class="fab-cart" id="fabCart">
    <span>Ver pedido</span>
    <span class="fab-cart-info">
      <span id="fabCount">0</span> itens · R$ <span id="fabTotal">0,00</span>
    </span>
  </button>

  <!-- Drawer do carrinho -->
  <div class="overlay" id="overlay"></div>
  <aside class="cart-drawer" id="cartDrawer">
    <div class="cart-header">
      <h2>Seu pedido</h2>
      <button class="close-btn" id="closeCartBtn">&times;</button>
    </div>

    <div class="cart-body" id="cartBody">
      <p class="empty-cart" id="emptyCartMsg">Seu carrinho está vazio.<br>Adicione alguns pastéis! 🥟</p>
      <div id="cartItems"></div>
    </div>

    <div class="cart-footer" id="cartFooter" style="display:none;">

      <div class="form-group">
        <label for="custName">Seu nome</label>
        <input type="text" id="custName" placeholder="Nome completo">
      </div>

      <div class="form-group">
        <label for="custPhone">Telefone (com DDD)</label>
        <input type="tel" id="custPhone" placeholder="(94) 99999-9999">
      </div>

      <div class="form-group">
        <label>Tipo de pedido</label>
        <div class="toggle-group">
          <button class="toggle-btn active" data-mode="entrega">Entrega</button>
          <button class="toggle-btn" data-mode="retirada">Retirar no local</button>
        </div>
      </div>

      <div id="deliveryFields">
        <div class="form-group">
          <label for="bairroSelect">Bairro</label>
          <select id="bairroSelect">
            <option value="">Selecione seu bairro</option>
          </select>
        </div>

        <div class="form-group">
          <label for="custAddress">Endereço completo</label>
          <input type="text" id="custAddress" placeholder="Rua, número, complemento, ponto de referência">
        </div>
      </div>

      <div class="form-group">
        <label for="custNote">Observação (opcional)</label>
        <input type="text" id="custNote" placeholder="Ex: sem cebola, troco para R$50...">
      </div>

      <div class="form-group">
        <label>Forma de pagamento</label>
        <select id="paySelect">
          <option value="Pix">Pix</option>
          <option value="Cartão de Crédito/Débito na entrega">Cartão na entrega</option>
          <option value="Dinheiro">Dinheiro</option>
        </select>
      </div>

      <div class="cart-summary">
        <div class="summary-row"><span>Subtotal</span><span id="sumSubtotal">R$ 0,00</span></div>
        <div class="summary-row" id="sumDeliveryRow"><span>Taxa de entrega</span><span id="sumDelivery">R$ 0,00</span></div>
        <div class="summary-row total"><span>Total</span><span id="sumTotal">R$ 0,00</span></div>
      </div>

      <button class="confirm-btn" id="confirmBtn">
        Confirmar pedido no WhatsApp
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M17.6 6.32A8.86 8.86 0 0 0 12.05 4a8.94 8.94 0 0 0-7.74 13.4L3 21l3.7-1.27a8.93 8.93 0 0 0 5.35 1.72h.01a8.94 8.94 0 0 0 8.94-8.94 8.86 8.86 0 0 0-2.4-6.19zM12.06 19.9a7.4 7.4 0 0 1-3.79-1.04l-.27-.16-2.81.97.95-2.74-.18-.28a7.42 7.42 0 0 1 11.46-9.27 7.34 7.34 0 0 1 2.18 5.25 7.42 7.42 0 0 1-7.54 7.27zm4.08-5.56c-.22-.11-1.31-.65-1.51-.72-.2-.07-.35-.11-.5.11-.15.22-.57.72-.7.87-.13.15-.26.16-.48.05-.22-.11-1.31-.48-2.18-2.68-.16-.28-.66-.94-.07-1.16.07-.27.21-.41.31-.48.1-.07.22-.1.27-.18a.61.61 0 0 0 0-.55c-.07-.14-.57-1.37-.78-1.87-.21-.5-.43-.43-.59-.44-.15-.01-.33-.01-.5-.01a.97.97 0 0 0-.7.33c-.24.26-.93.91-.93 2.22s.95 2.58 1.08 2.76c.13.18 1.83 2.78 4.43 3.79 2.6 1.01 2.6.67 3.07.63.47-.04 1.51-.61 1.72-1.2.21-.59.21-1.09.15-1.2-.07-.1-.22-.16-.45-.27z"/></svg>
      </button>
    </div>
  </aside>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
